<svg width="400" height="500" viewBox="0 0 400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Books Stack -->
  <rect x="280" y="300" width="80" height="50" rx="4" fill="#FFD93D" />
  <rect x="280" y="290" width="80" height="8" fill="#FF6B9E" />
  <rect x="270" y="310" width="80" height="50" rx="4" fill="#4D96FF" />
  <rect x="270" y="300" width="80" height="8" fill="#6BCB77" />

  <!-- Kids studying - group of 3 -->
  <!-- Kid 1 -->
  <circle cx="120" cy="180" r="18" fill="#FFD93D" />
  <path d="M 110 210 L 110 260 M 110 225 L 80 240 M 110 225 L 140 240" stroke="#4D96FF" strokeWidth="8" strokeLinecap="round" />
  <circle cx="80" cy="245" r="8" fill="#4D96FF" />
  <circle cx="140" cy="245" r="8" fill="#4D96FF" />

  <!-- Kid 2 -->
  <circle cx="200" cy="190" r="18" fill="#FF6B9E" />
  <path d="M 190 220 L 190 270 M 190 235 L 160 250 M 190 235 L 220 250" stroke="#6BCB77" strokeWidth="8" strokeLinecap="round" />
  <circle cx="160" cy="255" r="8" fill="#6BCB77" />
  <circle cx="220" cy="255" r="8" fill="#6BCB77" />

  <!-- Kid 3 reading book -->
  <circle cx="280" cy="170" r="18" fill="#6BCB77" />
  <path d="M 270 200 L 270 250 M 270 215 L 240 230 M 270 215 L 300 230" stroke="#FFD93D" strokeWidth="8" strokeLinecap="round" />
  <circle cx="240" cy="235" r="8" fill="#FFD93D" />
  <circle cx="300" cy="235" r="8" fill="#FFD93D" />

  <!-- Book in hand -->
  <rect x="290" y="190" width="35" height="45" rx="2" fill="#8B5CF6" />
  <line x1="295" y1="200" x2="320" y2="200" stroke="#FFD93D" strokeWidth="2" />
  <line x1="295" y1="210" x2="320" y2="210" stroke="#FF6B9E" strokeWidth="2" />
  <line x1="295" y1="220" x2="320" y2="220" stroke="#4D96FF" strokeWidth="2" />

  <!-- Graduation caps floating -->
  <path d="M 80 120 L 100 120 L 90 105 Z" fill="#FFD93D" />
  <rect x="85" y="110" width="10" height="5" fill="#FFD93D" />

  <path d="M 320 130 L 340 130 L 330 115 Z" fill="#4D96FF" />
  <rect x="325" y="120" width="10" height="5" fill="#4D96FF" />

  <!-- Lightbulbs - idea symbols -->
  <circle cx="60" cy="90" r="15" fill="#FFD93D" opacity="0.7" />
  <rect x="55" y="105" width="10" height="15" fill="#FFD93D" opacity="0.7" />

  <circle cx="340" cy="80" r="15" fill="#FF6B9E" opacity="0.7" />
  <rect x="335" y="95" width="10" height="15" fill="#FF6B9E" opacity="0.7" />

  <!-- Pencils -->
  <rect x="100" y="290" width="40" height="4" fill="#8B5CF6" />
  <polygon points="140,290 145,288 145,292" fill="#8B5CF6" />

  <rect x="200" y="350" width="40" height="4" fill="#FF6B9E" />
  <polygon points="240,350 245,348 245,352" fill="#FF6B9E" />

  <!-- Apple -->
  <circle cx="350" cy="350" r="12" fill="#FF6B9E" />
  <rect x="348" y="362" width="4" height="8" fill="#6BCB77" />
</svg>