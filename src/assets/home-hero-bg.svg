<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="none" role="img" aria-label="Pastel playful background">
  <defs>
    <linearGradient id="wash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#AEE2FF" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#FFF6A5" stop-opacity="0.92"/>
      <stop offset="70%" stop-color="#FFC6D9" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="#C1F4C5" stop-opacity="0.92"/>
    </linearGradient>

    <radialGradient id="glow" cx="55%" cy="25%" r="70%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <pattern id="dots" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="12" r="3" fill="#ffffff" opacity="0.25"/>
      <circle cx="30" cy="18" r="2.2" fill="#ffffff" opacity="0.18"/>
      <circle cx="22" cy="34" r="2.6" fill="#ffffff" opacity="0.16"/>
    </pattern>

    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#AEE2FF" stop-opacity="0.65"/>
      <stop offset="50%" stop-color="#FFC6D9" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#C1F4C5" stop-opacity="0.60"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#wash)"/>
  <rect width="1200" height="600" fill="url(#dots)" opacity="0.6"/>
  <rect width="1200" height="600" fill="url(#glow)" opacity="0.85"/>

  <!-- Soft waves at bottom -->
  <path d="M0 460c120 40 240 55 360 45s240-40 360-20 240 60 360 20v115H0z" fill="url(#wave)" opacity="0.55"/>
  <path d="M0 500c140 35 260 45 360 30s220-60 360-35 240 75 480 20v85H0z" fill="#ffffff" opacity="0.18"/>
</svg>
